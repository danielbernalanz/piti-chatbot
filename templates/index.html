<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PitiBot - Chatbot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #212121;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    background: #171717;
    padding: 14px 20px;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }
  .header .subtitle {
    font-size: 13px;
    color: #999;
  }
  .header .status {
    margin-left: auto;
    font-size: 12px;
    color: #4ade80;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .header .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    display: inline-block;
  }
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
  }
  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  .messages {
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
    padding: 0 20px;
  }
  .message {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    align-items: flex-start;
  }
  .message.user { flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .message.bot .avatar { background: #6b48ff; color: #fff; }
  .message.user .avatar { background: #4ade80; color: #000; }
  .bubble {
    max-width: 75%;
    padding: 10px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .message.bot .bubble {
    background: #2d2d2d;
    border-top-left-radius: 4px;
    color: #e0e0e0;
  }
  .message.user .bubble {
    background: #6b48ff;
    border-top-right-radius: 4px;
    color: #fff;
  }
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing-indicator span {
    width: 8px; height: 8px;
    background: #888;
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }
  .input-area {
    background: #171717;
    border-top: 1px solid #333;
    padding: 16px 20px;
    flex-shrink: 0;
  }
  .input-wrapper {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .input-wrapper textarea {
    flex: 1;
    background: #2d2d2d;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 12px 16px;
    color: #e0e0e0;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 24px;
    max-height: 200px;
    line-height: 1.4;
  }
  .input-wrapper textarea:focus { border-color: #6b48ff; }
  .input-wrapper textarea::placeholder { color: #666; }
  .input-wrapper button {
    background: #6b48ff;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
    font-weight: 500;
    white-space: nowrap;
  }
  .input-wrapper button:hover { background: #5a3ddb; }
  .input-wrapper button:disabled {
    background: #444;
    cursor: not-allowed;
  }
  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: #666;
  }
  .welcome h2 { font-size: 24px; color: #888; margin-bottom: 8px; }
  .welcome p { font-size: 14px; }
  .error-msg {
    background: #3d1f1f;
    color: #f87171;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-top: 4px;
    display: none;
  }
  .btn-reset {
    background: transparent;
    border: 1px solid #444;
    color: #999;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    margin-left: 10px;
    transition: border-color 0.2s;
  }
  .btn-reset:hover { border-color: #f87171; color: #f87171; }
  @media (max-width: 600px) {
    .bubble { max-width: 85%; font-size: 14px; }
    .header h1 { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="avatar" style="width:36px;height:36px;background:#6b48ff;font-size:16px;">PB</div>
  <div>
    <h1>PitiBot</h1>
    <div class="subtitle"></div>
  </div>
  <div class="status">
    <span class="status-dot"></span>
    Online
    <button class="btn-reset" onclick="resetChat()">Reset</button>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <h2>Habla con PitiBot</h2>
      <p>Escribe algo para empezar...</p>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="input" rows="1" placeholder="Escribe un mensaje..." onkeydown="handleKey(event)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">Enviar</button>
  </div>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
  const sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  let isWaiting = false;

  const chatContainer = document.getElementById('chatContainer');
  const messagesEl = document.getElementById('messages');
  const welcomeEl = document.getElementById('welcome');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const errorMsg = document.getElementById('errorMsg');

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 200) + 'px';
  }
  input.addEventListener('input', autoResize);

  function scrollToBottom() {
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function addMessage(role, text) {
    welcomeEl.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'message ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'bot' ? 'PB' : 'Tú';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'DB';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    for (let i = 0; i < 3; i++) {
      const span = document.createElement('span');
      indicator.appendChild(span);
    }
    bubble.appendChild(indicator);
    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    setTimeout(() => { errorMsg.style.display = 'none'; }, 5000);
  }

  function setLoading(loading) {
    isWaiting = loading;
    sendBtn.disabled = loading;
    input.disabled = loading;
    if (!loading) input.focus();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isWaiting) return;

    input.value = '';
    input.style.height = 'auto';
    errorMsg.style.display = 'none';

    addMessage('user', text);
    setLoading(true);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        showError('Error: ' + data.error);
      } else {
        addMessage('bot', data.reply);
      }
    } catch (e) {
      removeTyping();
      showError('Error de conexión');
    }
    setLoading(false);
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  async function resetChat() {
    if (!confirm('¿Reiniciar conversación?')) return;
    setLoading(true);
    try {
      await fetch('/api/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId })
      });
      messagesEl.querySelectorAll('.message').forEach(el => el.remove());
      welcomeEl.style.display = 'block';
    } catch (e) {
      showError('Error al reiniciar');
    }
    setLoading(false);
  }
</script>
</body>
</html>
